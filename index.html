<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real YouTube Insight Generator</title>
    <style>
        /* --- CSS STYLES --- */
        :root {
            --text-main: #333;
            --text-light: #555;
            --primary: #667eea;
            --primary-hover: #5a6cd6;
            --card-bg: rgba(255, 255, 255, 0.95);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #a18cd1 0%, #fbc2eb 100%);
            background-attachment: fixed;
            color: var(--text-main);
            line-height: 1.6;
            padding: 2rem;
        }

        .hidden { display: none !important; }
        
        .error { 
            color: #d32f2f; 
            font-weight: bold; 
            margin-top: 15px; 
            background: rgba(255,255,255,0.9); 
            padding: 10px; 
            border-radius: 5px; 
            display: inline-block;
        }

        .header { text-align: center; margin-bottom: 2rem; color: #fff; text-shadow: 1px 1px 4px rgba(0,0,0,0.2); }
        .header h1 { font-size: 2.8rem; margin-bottom: 0.5rem; }

        .input-group { display: flex; justify-content: center; gap: 10px; margin-top: 1.5rem; }
        input[type="text"] { 
            width: 60%; max-width: 600px; padding: 14px 20px; 
            border: none; border-radius: 8px; font-size: 1rem; 
            outline: none; box-shadow: 0 4px 6px rgba(0,0,0,0.1); 
        }
        
        button { 
            padding: 14px 24px; background-color: var(--primary); 
            color: white; border: none; border-radius: 8px; 
            font-size: 1rem; cursor: pointer; font-weight: 600; 
            transition: transform 0.2s, box-shadow 0.2s; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); 
        }
        button:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 6px 12px rgba(0,0,0,0.15); }
        button:disabled { background-color: #a0aec0; cursor: not-allowed; }

        .container { max-width: 1200px; margin: 0 auto; display: flex; flex-direction: column; gap: 2rem; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; }
        @media (max-width: 768px) { .grid { grid-template-columns: 1fr; } }

        .card { 
            background: var(--card-bg); padding: 2rem; 
            border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); 
            backdrop-filter: blur(10px); 
        }
        .card h2 { 
            margin-bottom: 1rem; font-size: 1.4rem; 
            border-bottom: 2px solid #eee; padding-bottom: 0.5rem; color: var(--primary); 
        }
        
        .scroll-box { 
            max-height: 300px; overflow-y: auto; padding-right: 15px; 
            color: var(--text-light); margin-bottom: 1.5rem; font-size: 0.95rem; 
            white-space: pre-wrap; 
        }

        .audio-btn { width: 100%; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .audio-controls { text-align: center; }
        .control-btn { background-color: #f0f0f0; color: #333; margin: 0 5px; }
        .stop-btn { background-color: #ff5252; color: white; }

        /* Pure CSS Flowchart */
        .flowchart { display: flex; flex-direction: column; align-items: center; gap: 20px; padding: 20px 0; }
        .flow-node { 
            background: #4a5568; color: #ffffff; padding: 15px 25px; 
            border-radius: 8px; font-weight: 500; text-align: center; 
            width: 80%; max-width: 500px; box-shadow: 0 4px 10px rgba(0,0,0,0.15); 
            position: relative; border: 2px solid #2d3748; 
        }
        .flow-node:not(:last-child)::after { 
            content: ''; position: absolute; bottom: -22px; left: 50%; 
            transform: translateX(-50%); border-width: 10px; border-style: solid; 
            border-color: #4a5568 transparent transparent transparent; 
        }
    </style>
</head>
<body>

    <header class="header">
        <h1>Video Insight Generator</h1>
        <p>Enter a YouTube link to fetch the real transcript, summarize it, and generate a flowchart.</p>
        <div class="input-group">
            <input type="text" id="youtube-url" placeholder="Paste YouTube URL here (e.g., https://www.youtube.com/watch?v=...)">
            <button id="process-btn">Analyze Video</button>
        </div>
        <p id="error-message" class="error hidden"></p>
    </header>

    <main class="container hidden" id="results-container">
        <div class="grid">
            <section class="card">
                <h2>Full Transcript</h2>
                <div class="scroll-box" id="transcript-text"></div>
                <button class="audio-btn" onclick="speakText('transcript-text')">Listen to Transcript</button>
            </section>

            <section class="card">
                <h2>Extracted Summary</h2>
                <div class="scroll-box" id="summary-text"></div>
                <button class="audio-btn" onclick="speakText('summary-text')">Listen to Summary</button>
            </section>
        </div>

        <section class="card audio-controls">
            <h2>Audio Playback Controls</h2>
            <button onclick="pauseSpeech()" class="control-btn">Pause</button>
            <button onclick="resumeSpeech()" class="control-btn">Resume</button>
            <button onclick="stopSpeech()" class="control-btn stop-btn">Stop Audio</button>
        </section>

        <section class="card">
            <h2>Logical Flowchart</h2>
