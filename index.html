<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Video Analyzer</title>
    <style>

        /* Base Resets and Typography */
:root {
    --bg-color: #f4f7f6;
    --text-main: #333;
    --text-light: #666;
    --primary: #4A90E2;
    --primary-hover: #357ABD;
    --card-bg: #ffffff;
}

* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

/* Using native system fonts for great typography without CDNs */
body {
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    background-color: var(--bg-color);
    color: var(--text-main);
    line-height: 1.6;
    padding: 2rem;
}

.hidden {
    display: none !important;
}

/* Header & Inputs */
.header {
    text-align: center;
    margin-bottom: 2rem;
}

.header h1 {
    font-size: 2.5rem;
    margin-bottom: 0.5rem;
    background: linear-gradient(90deg, #4A90E2, #9013FE);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.input-group {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-top: 1.5rem;
}

input[type="text"] {
    width: 60%;
    max-width: 500px;
    padding: 12px 20px;
    border: 2px solid #ddd;
    border-radius: 8px;
    font-size: 1rem;
    outline: none;
    transition: border-color 0.3s;
}

input[type="text"]:focus {
    border-color: var(--primary);
}

button {
    padding: 12px 24px;
    background-color: var(--primary);
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 1rem;
    cursor: pointer;
    font-weight: 600;
    transition: background-color 0.3s;
}

button:hover {
    background-color: var(--primary-hover);
}

/* Layout & Cards */
.container {
    max-width: 1200px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 2rem;
}

.grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 2rem;
}

@media (max-width: 768px) {
    .grid {
        grid-template-columns: 1fr;
    }
}

.card {
    background: var(--card-bg);
    padding: 2rem;
    border-radius: 12px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.05);
}

.card h2 {
    margin-bottom: 1rem;
    font-size: 1.4rem;
    border-bottom: 2px solid #f0f0f0;
    padding-bottom: 0.5rem;
}

.scroll-box {
    max-height: 300px;
    overflow-y: auto;
    padding-right: 10px;
    color: var(--text-light);
    margin-bottom: 1.5rem;
}

/* Audio Controls */
.audio-btn {
    width: 100%;
    background: linear-gradient(135deg, #6e8efb, #a777e3);
}

.audio-controls {
    text-align: center;
}

.control-btn {
    background-color: #eee;
    color: #333;
    margin: 0 5px;
}

.control-btn:hover {
    background-color: #ddd;
}

.stop-btn {
    background-color: #ff5252;
    color: white;
}
.stop-btn:hover {
    background-color: #d32f2f;
}

/* Custom Pure CSS Flowchart */
.flowchart {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    padding: 20px 0;
}

.flow-node {
    background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
    color: #004d40;
    padding: 15px 25px;
    border-radius: 8px;
    font-weight: bold;
    text-align: center;
    width: 80%;
    max-width: 400px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    position: relative;
}

/* Create the down arrow between nodes natively */
.flow-node:not(:last-child)::after {
    content: '';
    position: absolute;
    bottom: -20px;
    left: 50%;
    transform: translateX(-50%);
    border-width: 10px;
    border-style: solid;
    border-color: #ccc transparent transparent transparent;
}
    </style>
</head>
<body>
    <header class="header">
        <h1>Video Insight Generator</h1>
        <p>Enter a YouTube link to get the transcript, summary, and visual flowchart.</p>
        <div class="input-group">
            <input type="text" id="youtube-url" placeholder="Paste YouTube URL here...">
            <button id="process-btn">Analyze Video</button>
        </div>
    </header>

    <main class="container hidden" id="results-container">
        <div class="grid">
            <section class="card">
                <h2>Full Transcript</h2>
                <div class="scroll-box" id="transcript-text">
                    </div>
                <button class="audio-btn" onclick="speakText('transcript-text')">Listen to Transcript</button>
            </section>

            <section class="card">
                <h2>Detailed Summary</h2>
                <div class="scroll-box" id="summary-text">
                    </div>
                <button class="audio-btn" onclick="speakText('summary-text')">Listen to Summary</button>
            </section>
        </div>

        <section class="card audio-controls">
            <h2>Audio Playback Controls</h2>
            <button onclick="pauseSpeech()" class="control-btn">Pause</button>
            <button onclick="resumeSpeech()" class="control-btn">Resume</button>
            <button onclick="stopSpeech()" class="control-btn stop-btn">Stop Audio</button>
        </section>

        <section class="card">
            <h2>Concept Flowchart</h2>
            <div id="flowchart-container" class="flowchart">
                </div>
        </section>
    </main>

    <script>

        // Store the speech synthesis API instance
const synth = window.speechSynthesis;

document.getElementById('process-btn').addEventListener('click', () => {
    const url = document.getElementById('youtube-url').value;
    
    if (!url) {
        alert("Please enter a YouTube link.");
        return;
    }

    // Show loading state (could be enhanced later)
    document.getElementById('process-btn').innerText = "Analyzing...";

    // SIMULATING an API Call to a backend. 
    // In reality, you would use fetch() here to call your Node/Python server.
    setTimeout(() => {
        const mockData = generateMockData();
        displayResults(mockData);
        
        document.getElementById('process-btn').innerText = "Analyze Video";
        document.getElementById('results-container').classList.remove('hidden');
    }, 1500); // 1.5 second simulated delay
});

function displayResults(data) {
    // 1. Inject Transcript
    document.getElementById('transcript-text').innerText = data.transcript;
    
    // 2. Inject Summary
    document.getElementById('summary-text').innerText = data.summary;

    // 3. Generate Flowchart dynamically
    const flowchartContainer = document.getElementById('flowchart-container');
    flowchartContainer.innerHTML = ''; // Clear previous

    // Iterate through our steps and build HTML elements natively
    data.flowchartSteps.forEach(step => {
        const node = document.createElement('div');
        node.className = 'flow-node';
        node.innerText = step;
        flowchartContainer.appendChild(node);
    });
}

// --- Text-to-Speech Functions ---

function speakText(elementId) {
    // Stop any current speech before starting a new one
    synth.cancel();
    
    const textToRead = document.getElementById(elementId).innerText;
    
    if (textToRead.trim() === '') {
        alert("There is no text to read.");
        return;
    }

    const utterance = new SpeechSynthesisUtterance(textToRead);
    
    // Optional: You can tweak the voice settings here
    utterance.rate = 1; // Speed (0.1 to 10)
    utterance.pitch = 1; // Pitch (0 to 2)

    synth.speak(utterance);
}

function pauseSpeech() {
    if (synth.speaking && !synth.paused) {
        synth.pause();
    }
}

function resumeSpeech() {
    if (synth.paused) {
        synth.resume();
    }
}

function stopSpeech() {
    synth.cancel();
}

// --- Mock Data Generator ---
// This represents the data your future backend will return
function generateMockData() {
    return {
        transcript: "Welcome to this tutorial. Today we are going to learn about photosynthesis. Photosynthesis is the process by which green plants and some other organisms use sunlight to synthesize foods from carbon dioxide and water. It generally involves the green pigment chlorophyll and generates oxygen as a byproduct. First, sunlight is captured by the leaves. Then, carbon dioxide enters the leaf through stomata. Water is absorbed from the roots. Finally, glucose is produced for energy, and oxygen is released into the air.",
        summary: "This video explains the concept of photosynthesis. It breaks down how plants absorb sunlight, carbon dioxide, and water to produce glucose for energy and oxygen as a byproduct, highlighting the role of chlorophyll.",
        flowchartSteps: [
            "1. Plant leaves capture sunlight via chlorophyll",
            "2. Leaves absorb Carbon Dioxide through stomata",
            "3. Roots draw up Water from the soil",
            "4. Chemical reaction creates Glucose (Energy)",
            "5. Oxygen is released as a byproduct"
        ]
    };
}
    </script>
</body>
</html>
